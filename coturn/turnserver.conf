# ========================================
# EA-Video coturn TURN/STUN Configuration
# All ports within 58101-58200 range
# ========================================

# STUN/TURN main listening port
listening-port=58105

# TURNS (TLS) listening port
tls-listening-port=58106

# Listen on all interfaces
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Server realm
realm=ea-video
server-name=1.117.233.43

# Authentication via shared secret (Jitsi integration)
use-auth-secret
static-auth-secret=26qhHacw864XRv3MCgLdinL7Bic4kC0X

# Relay port range (within 58101-58200 band)
min-port=58110
max-port=58200

# Logging
log-file=stdout
verbose

# Security: prevent relay to private IPs
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Allow Docker internal network (JVB container needs to be reachable via TURN relay)
allowed-peer-ip=172.17.0.0-172.31.255.255

# Required by Jitsi
fingerprint

# Disable CLI
no-cli
